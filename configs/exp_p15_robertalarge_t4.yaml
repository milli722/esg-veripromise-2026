extends: exp_p2_combo_best.yaml
exp_name: p15_robertalarge_t4
# Phase 48 — stronger backbone targeting the TRANSFERABLE high-weight task T4
# (evidence_quality, w=0.35, LB 0.437, OOF->LB gap only +0.027 = trustworthy).
# Rationale (MASTER_PLAN §58.13): binary OOF is adaptively overfit and does NOT
# transfer; only T2/T4 OOF transfer. roberta-wwm-ext-large is cached (offline-OK)
# and is a genuine architecture+size step beyond the all-macbert-base pool.
# Single seed=42 first to confirm VRAM/convergence; promote to 2024/20260417
# only if T4 OOF >= 0.48 (admission gate).
#
# CRITICAL: train on the combined train+val (2000 rows) so the 5-fold OOF aligns
# index-for-index with the existing _tv pool stems (required by the 9-way
# per-task hillclimb reconstruction). Inheriting base.yaml's 1000-row CSV would
# break OOF alignment.
data:
  csv_path: data/processed/train_val_combined.csv
model:
  backbone: hfl/chinese-roberta-wwm-ext-large
  max_length: 512          # cut the 40% head-truncation; T4 evidence often in tail
  pooling: cls_mean
training:
  lr: 1.5e-5               # large ~ 0.5x of base 3e-5
  batch_size: 2
  grad_accum: 8            # effective batch = 16 (matches combo_best)
  epochs: 5
  early_stop_patience: 2
  use_class_weight: false
  focal_tasks: [evidence_quality]   # focal on T4 to fight class imbalance
  focal_gamma: 2.0
seeds: [42]
