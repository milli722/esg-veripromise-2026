extends: base.yaml
exp_name: p6_t6v2_bucket_tok
# Sprint B / T6 v2: dedicated added-vocab bucket tokens
# (5 single tokens [T_already] / [T_within2] / [T_2to5] / [T_longer5] / [T_NA])
# Encoder embedding resized; new rows learned from scratch.
# Inherits combo_best hyperparams (no_classw + maxlen384 + lr3e5).
data:
  text_transform: time_bucket_token
training:
  lr: 3.0e-5
  use_class_weight: false
  batch_size: 8
  grad_accum: 2
model:
  max_length: 384
seeds: [42]
